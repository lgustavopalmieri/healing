version: '3.8'

services:
  healing-specialist:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healing-specialist-test
    ports:
      - "50051:50051"
    env_file:
      - .env.test
    environment:
      - APP_ENV=test
    networks:
      - healing-network
    restart: unless-stopped

networks:
  healing-network:
    external: true
