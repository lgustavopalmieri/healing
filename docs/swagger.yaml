info:
  contact: {}
  description: API for managing healthcare specialists on the Healing platform. Supports
    registration, search with cursor-based pagination, and profile updates.
  title: Healing Specialist API
  version: "1.0"
paths:
  /api/v1/auth/set-password:
    post:
      consumes:
      - application/json
      description: Consumes a single-use set-password token, activates the credential,
        and returns access/refresh tokens. The token is issued during onboarding and
        can be used only once.
      parameters:
      - description: Set-password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth_features_set-password_adapters_inbound_http_handler.SetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_auth_features_set-password_adapters_inbound_http_handler.SetPasswordResponse'
        "400":
          description: Invalid payload or weak password
          schema:
            $ref: '#/definitions/internal_modules_auth_features_set-password_adapters_inbound_http_handler.ErrorResponse'
        "401":
          description: Invalid or already used token
          schema:
            $ref: '#/definitions/internal_modules_auth_features_set-password_adapters_inbound_http_handler.ErrorResponse'
        "409":
          description: Credential not in pending state
          schema:
            $ref: '#/definitions/internal_modules_auth_features_set-password_adapters_inbound_http_handler.ErrorResponse'
        "500":
          description: Infrastructure failure
          schema:
            $ref: '#/definitions/internal_modules_auth_features_set-password_adapters_inbound_http_handler.ErrorResponse'
      summary: Set initial password for a pending credential
      tags:
      - auth
  /api/v1/auth/specialist/login:
    post:
      consumes:
      - application/json
      description: Authenticate a specialist with email and password. Returns access
        and refresh tokens.
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth_features_login_adapters_inbound_http_handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_auth_features_login_adapters_inbound_http_handler.LoginResponse'
        "400":
          description: Invalid payload
          schema:
            $ref: '#/definitions/internal_modules_auth_features_login_adapters_inbound_http_handler.ErrorResponse'
        "401":
          description: Invalid credentials or locked account
          schema:
            $ref: '#/definitions/internal_modules_auth_features_login_adapters_inbound_http_handler.ErrorResponse'
        "500":
          description: Infrastructure failure
          schema:
            $ref: '#/definitions/internal_modules_auth_features_login_adapters_inbound_http_handler.ErrorResponse'
      summary: Login as specialist
      tags:
      - auth
  /api/v1/specialists:
    post:
      consumes:
      - application/json
      description: Registers a new healthcare specialist on the platform. The specialist
        starts with pending status and goes through license validation.
      parameters:
      - description: Specialist data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_modules_specialist_features_create_adapters_inbound_http_handler.CreateSpecialistRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_modules_specialist_features_create_adapters_inbound_http_handler.SpecialistResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/internal_modules_specialist_features_create_adapters_inbound_http_handler.ErrorResponse'
        "422":
          description: Domain validation error
          schema:
            $ref: '#/definitions/internal_modules_specialist_features_create_adapters_inbound_http_handler.ErrorResponse'
      summary: Create a new specialist
      tags:
      - specialists
  /api/v1/specialists/{id}:
    patch:
      consumes:
      - application/json
      description: Partially updates a specialist's profile data. Only provided fields
        are updated (PATCH semantics).
      parameters:
      - description: Specialist UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_modules_specialist_features_update_adapters_inbound_http_handler.UpdateSpecialistRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_specialist_features_update_adapters_inbound_http_handler.SpecialistResponse'
        "400":
          description: Missing ID or invalid request body
          schema:
            $ref: '#/definitions/internal_modules_specialist_features_update_adapters_inbound_http_handler.ErrorResponse'
        "422":
          description: Domain validation error
          schema:
            $ref: '#/definitions/internal_modules_specialist_features_update_adapters_inbound_http_handler.ErrorResponse'
      summary: Update a specialist
      tags:
      - specialists
  /api/v1/specialists/search:
    post:
      consumes:
      - application/json
      description: Searches specialists using full-text search, filters, sorting and
        cursor-based pagination. Powered by OpenSearch.
      parameters:
      - description: Search criteria
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_modules_specialist_features_search_adapters_inbound_http_handler.SearchSpecialistsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_specialist_features_search_adapters_inbound_http_handler.SearchSpecialistsResponse'
        "400":
          description: Invalid request body or search parameters
          schema:
            $ref: '#/definitions/internal_modules_specialist_features_search_adapters_inbound_http_handler.ErrorResponse'
        "422":
          description: Search execution error
          schema:
            $ref: '#/definitions/internal_modules_specialist_features_search_adapters_inbound_http_handler.ErrorResponse'
      summary: Search specialists
      tags:
      - specialists
swagger: "2.0"
