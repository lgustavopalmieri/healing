version: '3.8'

services:
  healing-specialist:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healing-specialist
    ports:
      - "50051:50051"
    environment:
      - SERVER_GRPC_PORT=${SERVER_GRPC_PORT}
      - SERVER_SHUTDOWN_TIMEOUT=${SERVER_SHUTDOWN_TIMEOUT}
      - SERVER_MAX_CONNECTIONS=${SERVER_MAX_CONNECTIONS}
      - SERVER_CONNECTION_TIMEOUT=${SERVER_CONNECTION_TIMEOUT}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - KAFKA_AUTO_OFFSET_RESET=${KAFKA_AUTO_OFFSET_RESET}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_SERVICE_VERSION=${OTEL_SERVICE_VERSION}
      - OTEL_ENVIRONMENT=${OTEL_ENVIRONMENT}
      - OTEL_EXPORTER_OTLP_GRPC_ENDPOINT=${OTEL_EXPORTER_OTLP_GRPC_ENDPOINT}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL}
    networks:
      - healing-network
    restart: unless-stopped

networks:
  healing-network:
    external: true
