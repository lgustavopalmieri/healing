version: '3.8'

services:
  healing-specialist:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healing-specialist
    ports:
      - "50051:50051"
      - "4000:8080"
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - APP_ENV=${APP_ENV:-development}
    networks:
      - healing-network
    restart: unless-stopped

networks:
  healing-network:
    external: true
