apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-env
  namespace: observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: observability
data:
  CLUSTER_NAME: "healing-production"
  ENVIRONMENT: "production"
  TEMPO_ENDPOINT: "http://tempo.observability.svc.cluster.local:4318"
  PROMETHEUS_REMOTE_WRITE_ENDPOINT: "http://prometheus.observability.svc.cluster.local:9090/api/v1/write"
