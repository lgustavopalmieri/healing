apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: healing-specialist
  namespace: healing
  labels:
    app.kubernetes.io/name: healing-specialist
    app.kubernetes.io/component: backend
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: healing-specialist
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 50051
          protocol: TCP
        - port: 8080
          protocol: TCP
        - port: 9090
          protocol: TCP
  egress:
    - ports:
        - port: 5432
          protocol: TCP
        - port: 9092
          protocol: TCP
        - port: 9200
          protocol: TCP
        - port: 4317
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
