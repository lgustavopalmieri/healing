apiVersion: v1
kind: Service
metadata:
  name: healing-specialist
  namespace: healing
  labels:
    app.kubernetes.io/name: healing-specialist
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: healing-specialist
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
