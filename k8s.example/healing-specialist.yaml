apiVersion: v1
kind: Namespace
metadata:
  name: healing
  labels:
    app.kubernetes.io/part-of: healing-platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: healing-specialist
  namespace: healing
data:
  APP_ENV: "production"
  SERVER_GRPC_PORT: "50051"
  SERVER_HTTP_PORT: "8080"
  SERVER_SHUTDOWN_TIMEOUT: "30s"
  SERVER_MAX_CONNECTIONS: "1000"
  SERVER_CONNECTION_TIMEOUT: "10s"
  POSTGRES_HOST: ""
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ""
  POSTGRES_SSLMODE: "require"
  POSTGRES_MAX_OPEN_CONNS: "25"
  POSTGRES_MAX_IDLE_CONNS: "5"
  POSTGRES_CONN_MAX_LIFETIME: "5m"
  POSTGRES_CONN_MAX_IDLE_TIME: "10m"
  KAFKA_BOOTSTRAP_SERVERS: ""
  KAFKA_AUTO_OFFSET_RESET: "earliest"
  KAFKA_SASL_MECHANISM: "PLAIN"
  KAFKA_USE_TLS: "true"
  ELASTICSEARCH_ADDRESSES: ""
  ELASTICSEARCH_MAX_RETRIES: "3"
  ELASTICSEARCH_RETRY_BACKOFF: "1s"
  LICENSE_VALIDATION_BASE_URL: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: healing-specialist
  namespace: healing
type: Opaque
stringData:
  POSTGRES_USER: ""
  POSTGRES_PASSWORD: ""
  ELASTICSEARCH_CLOUD_ID: ""
  ELASTICSEARCH_USERNAME: ""
  ELASTICSEARCH_PASSWORD: ""
  KAFKA_SASL_USERNAME: ""
  KAFKA_SASL_PASSWORD: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: healing-specialist
  namespace: healing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healing-specialist
  template:
    metadata:
      labels:
        app: healing-specialist
    spec:
      terminationGracePeriodSeconds: 35
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        runAsNonRoot: true
      containers:
        - name: healing-specialist
          image: 
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50051
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: healing-specialist
            - secretRef:
                name: healing-specialist
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: healing-specialist
  namespace: healing
spec:
  selector:
    app: healing-specialist
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healing-specialist
  namespace: healing
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/group.name: healing-qa
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /swagger
            pathType: Prefix
            backend:
              service:
                name: healing-specialist
                port:
                  number: 8080
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: healing-specialist
                port:
                  number: 8080
          - path: /health
            pathType: Exact
            backend:
              service:
                name: healing-specialist
                port:
                  number: 8080
